# PetroChat-Agent demo compose.
#
# Start all demo services:
#   docker compose up -d --build
#
# Open:
#   Frontend: http://localhost:5173
#   API docs: http://localhost:8000/docs
#
# Local MySQL is published on 3307 to avoid clashing with a host MySQL on 3306.

name: petrochat-agent

services:
  mysql:
    image: mysql:8.0
    container_name: petrochat-mysql
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${PETROCHAT_MYSQL_ROOT_PASSWORD:-petrochat_root_demo}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-timing_task}
      MYSQL_USER: ${MYSQL_USER:-petrochat_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-petrochat_demo}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PUBLISHED_PORT:-3307}:3306"
    volumes:
      - petrochat_mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  chroma:
    image: chromadb/chroma:0.5.23
    container_name: petrochat-chroma
    restart: unless-stopped
    ports:
      - "${CHROMA_PUBLISHED_PORT:-8001}:8000"
    volumes:
      - ./chroma_db:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v2/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: petrochat-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      chroma:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-petrochat-docker-demo-secret-change-me}
      AUTH_TOKEN_EXPIRE_MINUTES: ${AUTH_TOKEN_EXPIRE_MINUTES:-480}
      AUTH_ALLOW_PLAINTEXT_PASSWORDS: ${AUTH_ALLOW_PLAINTEXT_PASSWORDS:-true}
      RETENTION_CONVERSATION_DAYS: ${RETENTION_CONVERSATION_DAYS:-180}
      RETENTION_CONVERSATION_RECOVERY_DAYS: ${RETENTION_CONVERSATION_RECOVERY_DAYS:-30}
      RETENTION_TOOL_LOG_DAYS: ${RETENTION_TOOL_LOG_DAYS:-365}
      RETENTION_RETRIEVAL_CONTEXT_DAYS: ${RETENTION_RETRIEVAL_CONTEXT_DAYS:-90}
      RETENTION_AUDIT_LOG_DAYS: ${RETENTION_AUDIT_LOG_DAYS:-1095}
      RETENTION_TEMP_FILE_DAYS: ${RETENTION_TEMP_FILE_DAYS:-30}
      EVAL_GATE_SUCCESS_RATE: ${EVAL_GATE_SUCCESS_RATE:-0.95}
      EVAL_GATE_SQL_TEMPLATE_VALID_RATE: ${EVAL_GATE_SQL_TEMPLATE_VALID_RATE:-0.95}
      EVAL_GATE_SQL_VALIDATION_RATE: ${EVAL_GATE_SQL_VALIDATION_RATE:-0.95}
      EVAL_GATE_SQL_CONTRACT_ACCURACY: ${EVAL_GATE_SQL_CONTRACT_ACCURACY:-0.85}
      EVAL_GATE_RAG_RECALL_AT_5: ${EVAL_GATE_RAG_RECALL_AT_5:-0.85}
      EVAL_GATE_RAG_MRR: ${EVAL_GATE_RAG_MRR:-0.65}
      EVAL_GATE_RAG_FAITHFULNESS_PROXY: ${EVAL_GATE_RAG_FAITHFULNESS_PROXY:-0.85}
      EVAL_GATE_MEMORY_HIT_RATE: ${EVAL_GATE_MEMORY_HIT_RATE:-0.80}
      EVAL_GATE_MEMORY_IGNORE_VIOLATION_RATE: ${EVAL_GATE_MEMORY_IGNORE_VIOLATION_RATE:-0.0}
      EVAL_GATE_MAX_AVG_LATENCY_MS: ${EVAL_GATE_MAX_AVG_LATENCY_MS:-15000}
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      CHROMA_COLLECTION: ${CHROMA_COLLECTION:-petrochat_specs}
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-timing_task}
      MYSQL_USER: ${MYSQL_USER:-petrochat_app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-petrochat_demo}
      MYSQL_TABLES_WHITELIST: ${MYSQL_TABLES_WHITELIST:-affair,affair_task}
      MYSQL_ENUM_SAMPLE_THRESHOLD: ${MYSQL_ENUM_SAMPLE_THRESHOLD:-30}
      SQL_DEFAULT_LIMIT: ${SQL_DEFAULT_LIMIT:-1000}
      SQL_TIMEOUT_SECONDS: ${SQL_TIMEOUT_SECONDS:-10}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      DEEPSEEK_CHAT_MODEL: ${DEEPSEEK_CHAT_MODEL:-deepseek-chat}
      DEEPSEEK_REASONER_MODEL: ${DEEPSEEK_REASONER_MODEL:-deepseek-reasoner}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-v3}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-1024}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-10}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY: ${LANGSMITH_API_KEY:-}
      LANGSMITH_PROJECT: ${LANGSMITH_PROJECT:-petrochat-agent}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
      MCP_ENABLED: "false"
      MCP_TRANSPORT: ${MCP_TRANSPORT:-stdio}
      MCP_SERVER_COMMAND: python
      MCP_SERVER_ARGS: -m petrochat.app.mcp.server
      MCP_SERVER_URL: http://api:8765/mcp
    ports:
      - "${API_PUBLISHED_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: petrochat-frontend
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${FRONTEND_PUBLISHED_PORT:-5173}:80"

volumes:
  petrochat_mysql_data:
